<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- MLB silhouette-style batter logo -->
  <rect rx="8" width="64" height="64" fill="#002D72"/>
  <!-- Batter silhouette -->
  <g transform="translate(32,32) scale(0.42)" fill="#fff">
    <!-- Head -->
    <circle cx="2" cy="-48" r="8"/>
    <!-- Body -->
    <path d="M-4,-40 C-6,-28 -8,-16 -6,-4 L-2,-4 C0,-16 2,-28 0,-40Z"/>
    <!-- Front leg -->
    <path d="M-6,-4 L-16,22 L-12,24 L-2,-2Z"/>
    <!-- Back leg -->
    <path d="M-2,-4 L8,22 L12,20 L2,-2Z"/>
    <!-- Bat -->
    <path d="M6,-44 L30,-18" stroke="#fff" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Front arm -->
    <path d="M-2,-34 C4,-36 6,-40 6,-44" stroke="#fff" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Back arm -->
    <path d="M0,-34 C4,-38 8,-42 6,-44" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Helmet brim -->
    <path d="M-6,-52 L10,-50" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>
  <!-- MLB text -->
  <text x="32" y="58" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" fill="#C4CED4" letter-spacing="2">MLB</text>
</svg>
